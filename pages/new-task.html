<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建任务 - TaskFlow</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">TaskFlow</span>
        </div>
        <ul class="nav-menu">
            <li><a href="../index.html" class="nav-link">
                <span class="nav-icon">📊</span>
                <span>仪表盘</span>
            </a></li>
            <li><a href="tasks.html" class="nav-link">
                <span class="nav-icon">✓</span>
                <span>任务列表</span>
            </a></li>
            <li><a href="new-task.html" class="nav-link active">
                <span class="nav-icon">➕</span>
                <span>新建任务</span>
            </a></li>
            <li><a href="categories.html" class="nav-link">
                <span class="nav-icon">🏷️</span>
                <span>分类管理</span>
            </a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h1 id="page-title">新建任务</h1>
            <a href="tasks.html" class="btn btn-secondary">
                <span>←</span> 返回列表
            </a>
        </header>

        <div class="form-container slide-up">
            <form id="task-form" class="task-form">
                <div class="form-group">
                    <label for="task-title">任务标题 *</label>
                    <input type="text" id="task-title" class="form-input" required placeholder="输入任务标题">
                </div>

                <div class="form-group">
                    <label for="task-description">任务描述</label>
                    <textarea id="task-description" class="form-input form-textarea" placeholder="添加任务描述..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">分类</label>
                        <select id="task-category" class="form-input select-input">
                            <option value="">选择分类</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="task-priority">优先级</label>
                        <select id="task-priority" class="form-input select-input">
                            <option value="low">低优先级</option>
                            <option value="medium" selected>中优先级</option>
                            <option value="high">高优先级</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-due-date">截止日期</label>
                        <input type="date" id="task-due-date" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="task-due-time">截止时间</label>
                        <input type="time" id="task-due-time" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label>标签</label>
                    <div class="tags-input-container">
                        <div id="tags-container" class="tags-container"></div>
                        <input type="text" id="tag-input" class="form-input tag-input" placeholder="输入标签后按回车">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="reset-form">重置</button>
                    <button type="submit" class="btn btn-primary" id="submit-btn">创建任务</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/task-form.js"></script>
</body>
</html>
