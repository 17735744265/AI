<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务列表 - TaskFlow</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">TaskFlow</span>
        </div>
        <ul class="nav-menu">
            <li><a href="../index.html" class="nav-link">
                <span class="nav-icon">📊</span>
                <span>仪表盘</span>
            </a></li>
            <li><a href="tasks.html" class="nav-link active">
                <span class="nav-icon">✓</span>
                <span>任务列表</span>
            </a></li>
            <li><a href="new-task.html" class="nav-link">
                <span class="nav-icon">➕</span>
                <span>新建任务</span>
            </a></li>
            <li><a href="categories.html" class="nav-link">
                <span class="nav-icon">🏷️</span>
                <span>分类管理</span>
            </a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h1>任务列表</h1>
            <a href="new-task.html" class="btn btn-primary">
                <span>➕</span> 新建任务
            </a>
        </header>

        <div class="filters fade-in">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="pending">进行中</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
            <button class="filter-btn" data-filter="overdue">已逾期</button>
        </div>

        <div class="filters fade-in">
            <select class="select-input" id="category-filter">
                <option value="">所有分类</option>
            </select>
            <select class="select-input" id="priority-filter">
                <option value="">所有优先级</option>
                <option value="high">高优先级</option>
                <option value="medium">中优先级</option>
                <option value="low">低优先级</option>
            </select>
            <input type="text" class="search-input" id="search-input" placeholder="搜索任务...">
        </div>

        <div class="task-list-container slide-up">
            <div class="task-list" id="task-list">
                <!-- 任务将通过 JavaScript 动态加载 -->
            </div>
        </div>
    </main>

    <div class="modal" id="delete-modal">
        <div class="modal-content">
            <h3>确认删除</h3>
            <p>确定要删除这个任务吗？此操作不可撤销。</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancel-delete">取消</button>
                <button class="btn btn-danger" id="confirm-delete">删除</button>
            </div>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/tasks.js"></script>
</body>
</html>
